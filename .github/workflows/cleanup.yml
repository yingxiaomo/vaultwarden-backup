name: Cleanup Old Container Images

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Query and cleanup old versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          PKG_NAME="vaultwarden-backup"
          KEEP=15
          API_BASE="/repos/${REPO}/packages/container/${PKG_NAME}"

          echo "=== Fetching all versions ==="
          gh api "${API_BASE}/versions" --paginate \
            --jq ".[] | {id: .id, tags: .metadata.container.tags, created: .created_at}" \
            > /tmp/all_versions.json 2>/dev/null

          if [ ! -s /tmp/all_versions.json ]; then
            echo "No versions found or API error"
            cat /tmp/all_versions.json 2>/dev/null
            exit 0
          fi

          SORTED=$(jq -s "sort_by(.created) | reverse" /tmp/all_versions.json)

          echo "=== Current version list ==="
          echo "$SORTED" | jq -r '.[] | "\(.id) \(.created) \(.tags | join(","))"'

          TO_DELETE=$(echo "$SORTED" | jq -c \
            --argjson keep "$KEEP" \
            '[.[$keep:] | .[] | select(.tags | index("latest") | not)]')

          COUNT=$(echo "$TO_DELETE" | jq length)
          echo "=== Versions to delete: $COUNT ==="

          if [ "$COUNT" -eq 0 ]; then
            echo "No old versions to clean up"
            exit 0
          fi

          echo "$TO_DELETE" | jq -r '.[] | "\(.id) (\(.tags | join(",")))"' | while read -r line; do
            VID=$(echo "$line" | awk "{print \$1}")
            echo "Deleting: $line"
            gh api -X DELETE "${API_BASE}/versions/${VID}" --silent || echo "Delete failed for $VID (may be latest/protected)"
          done

          echo "=== Cleanup completed ==="
