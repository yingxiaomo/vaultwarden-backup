<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultwarden 备份管理 - 初始化</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #343a40;
            --secondary-color: #495057;
            --accent-color: #0d6efd;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --success-color: #198754;
            --info-color: #0dcaf0;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
        }
        
        body {
            background-color: var(--dark-color);
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        }
        
        .setup-container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            margin: 0 auto;
        }
        
        .setup-card {
            background-color: var(--primary-color);
            color: white;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            padding: 2.5rem;
            border: 1px solid var(--secondary-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .setup-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }
        
        .setup-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .setup-header h2 {
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .setup-header h2 i {
            margin-right: 0.5rem;
            color: var(--accent-color);
        }
        
        .setup-header p {
            color: #adb5bd;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        .setup-header .text-light {
            font-size: 0.95rem;
            line-height: 1.4;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #adb5bd;
            font-weight: 500;
        }
        
        .form-control {
            background-color: #2b3035;
            border-color: var(--secondary-color);
            color: white;
            border-radius: 0.5rem;
            padding: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            background-color: #2b3035;
            color: white;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        
        .btn {
            border-radius: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }
        
        .btn-primary:hover {
            background-color: #0b5ed7;
            border-color: #0a58ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(13, 110, 253, 0.3);
        }
        
        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--secondary-color);
        }
        
        .form-section:last-child {
            border-bottom: none;
        }
        
        .form-section h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }
        
        .db-config {
            margin-top: 1.5rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .setup-container {
                padding: 1rem;
            }
            
            .setup-card {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="setup-container py-5">
        <div class="setup-card">
            <div class="setup-header">
                <h2><i class="bi bi-rocket-takeoff"></i> 欢迎使用</h2>
                <p>初次启动 Vaultwarden Backup</p>
                <p class="text-light">为了您的数据安全，请完成以下初始化配置。</p>
            </div>
            <form action="/do_setup" method="post">
                <!-- 管理员账号配置 -->
                <div class="form-section">
                    <h3><i class="bi bi-person-lock"></i> 管理员账号配置</h3>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>设置用户名</label>
                                <input type="text" class="form-control" name="username" placeholder="请输入用户名" required autocomplete="off">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>设置密码</label>
                                <input type="password" class="form-control" name="password" placeholder="请输入强密码" required autocomplete="new-password">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 数据库配置 -->
                <div class="form-section">
                    <h3><i class="bi bi-database"></i> 数据库配置</h3>
                    <div class="form-group">
                        <label>数据库类型</label>
                        <select class="form-control" name="db_type" id="db_type" required>
                            <option value="sqlite">SQLite (默认)</option>
                            <option value="mysql">MySQL</option>
                            <option value="postgres">PostgreSQL</option>
                        </select>
                    </div>
                    
                    <!-- MySQL/PostgreSQL 配置 -->
                    <div class="db-config" id="mysql_config" style="display: none;">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>数据库主机</label>
                                    <input type="text" class="form-control" name="db_host" placeholder="默认为 db">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>数据库端口</label>
                                    <input type="text" class="form-control" name="db_port" placeholder="MySQL默认为 3306，PostgreSQL默认为 5432">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>数据库用户名</label>
                                    <input type="text" class="form-control" name="db_user" placeholder="请输入数据库用户名">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>数据库密码</label>
                                    <input type="password" class="form-control" name="db_password" placeholder="请输入数据库密码">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label>数据库名称</label>
                                    <input type="text" class="form-control" name="db_name" placeholder="请输入数据库名称">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 基本配置 -->
                <div class="form-section">
                    <h3><i class="bi bi-gear"></i> 基本配置</h3>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>数据目录</label>
                                <input type="text" class="form-control" name="data_dir" placeholder="默认为 /data" value="/data">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>备份目录</label>
                                <input type="text" class="form-control" name="backup_dir" placeholder="默认为 /backup" value="/backup">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>备份前缀</label>
                                <input type="text" class="form-control" name="backup_prefix" placeholder="默认为 vaultwarden_backup" value="vaultwarden_backup">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>定时备份计划</label>
                                <input type="text" class="form-control" name="cron_schedule" placeholder="默认为 0 2 * * * (每天凌晨2点)" value="0 2 * * *">
                            </div>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-bold">
                    <i class="bi bi-check-circle"></i> 完成初始化并进入面板
                </button>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.min.js"></script>
    <script>
        // 监听数据库类型变化，显示/隐藏相应的配置项
        document.getElementById('db_type').addEventListener('change', function() {
            const mysqlConfig = document.getElementById('mysql_config');
            if (this.value === 'sqlite') {
                mysqlConfig.style.display = 'none';
            } else {
                mysqlConfig.style.display = 'block';
            }
        });
        
        // 初始加载时触发一次
        document.getElementById('db_type').dispatchEvent(new Event('change'));
    </script>
</body>
</html>
