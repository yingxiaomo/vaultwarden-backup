<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultwarden 备份管理 - 初始化</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .setup-card { background-color: #343a40; color: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 450px; padding: 2rem; border: 1px solid #495057; }
        .form-control { background-color: #2b3035; border-color: #495057; color: white; }
        .form-control:focus { background-color: #2b3035; color: white; border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
        .btn-primary { padding: 0.6rem; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold">🚀 欢迎使用</h2>
            <p class="text-secondary mt-2">初次启动 Vaultwarden Backup</p>
            <p class="text-light" style="font-size: 0.9rem;">为了您的数据安全，请设置 Web 面板的管理员账号和密码。</p>
        </div>
        <form action="/do_setup" method="post">
            <div class="mb-3">
                <label class="form-label text-secondary">设置用户名</label>
                <input type="text" class="form-control" name="username" placeholder="请输入用户名" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary">设置密码</label>
                <input type="password" class="form-control" name="password" placeholder="请输入强密码" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary w-100">完成初始化并进入面板</button>
        </form>
    </div>
</body>
</html>
