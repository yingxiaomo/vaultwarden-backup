<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultwarden 备份管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #343a40;
            color: white;
        }
        .btn-primary {
            background-color: #343a40;
            border-color: #343a40;
        }
        .btn-primary:hover {
            background-color: #23272b;
            border-color: #23272b;
        }
        .nav-link {
            color: #343a40;
        }
        .nav-link.active {
            color: white !important;
            background-color: #343a40 !important;
        }
        .table-hover tbody tr:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Vaultwarden 备份管理</h1>
        
        <nav class="nav nav-pills mb-4">
            <a class="nav-link active" href="/">仪表盘</a>
            <a class="nav-link" href="/config">配置</a>
            <a class="nav-link" href="/restore">恢复</a>
        </nav>
        
        <div class="row">
            <!-- 磁盘空间 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">磁盘空间</h5>
                    </div>
                    <div class="card-body">
                        <pre>{{ disk_space | join('\n') }}</pre>
                    </div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">操作</h5>
                    </div>
                    <div class="card-body">
                        <form action="/do_backup" method="post">
                            <button type="submit" class="btn btn-primary btn-block">执行备份</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 备份历史 -->
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">备份历史</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>文件名</th>
                                <th>大小</th>
                                <th>修改时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for backup in backup_history %}
                                <tr>
                                    <td>{{ backup.name }}</td>
                                    <td>{{ backup.size }}</td>
                                    <td>{{ backup.mtime }}</td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- 备份日志 -->
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">备份日志</h5>
            </div>
            <div class="card-body">
                <div class="bg-dark text-light p-3 rounded" style="height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px;">
                    <pre id="backup-logs">加载中...</pre>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 加载备份日志
        function loadLogs() {
            fetch('/logs')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('backup-logs').textContent = data.logs;
                    // 滚动到底部
                    const logsElement = document.getElementById('backup-logs');
                    logsElement.scrollTop = logsElement.scrollHeight;
                })
                .catch(error => {
                    document.getElementById('backup-logs').textContent = '加载日志失败: ' + error;
                });
        }
        
        // 初始加载
        loadLogs();
        
        // 每5秒刷新一次日志
        setInterval(loadLogs, 5000);
    </script>
</body>
</html>
