<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaultwarden 备份管理</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:#f5f6fa;font-family:'Segoe UI',sans-serif}.container{max-width:1200px}
.nav-pills{background:#fff;border-radius:8px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:24px}
.nav-pills .nav-link{color:#495057;border-radius:6px;padding:10px 20px;margin:0 4px}
.nav-pills .nav-link.active{background:#343a40;color:#fff}
.nav-pills .nav-link:hover{background:rgba(0,0,0,.05)}
.card{border:none;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:20px}
.card-header{background:#343a40;color:#fff;border-radius:12px 12px 0 0;padding:14px 20px}
.card-header h5{margin:0;font-weight:600}
.card-body{padding:20px}
.btn{border-radius:8px;padding:10px 24px;font-weight:600}
.btn-primary{background:#0d6efd;border-color:#0d6efd}
.btn-primary:hover{background:#0b5ed7;transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,110,253,.3)}
.btn-danger{background:#dc3545;border-color:#dc3545}
.table thead{background:#495057;color:#fff}.table thead th{padding:12px 16px;font-weight:600}
.log-box{background:#1e1e1e;color:#e9ecef;border-radius:8px;padding:16px;height:280px;overflow-y:auto;font:13px/1.5 'Courier New',monospace}
.log-box pre{margin:0;white-space:pre-wrap;word-wrap:break-word}
.alert-msg{display:none}
@media(max-width:768px){.nav-pills{flex-direction:column}.nav-pills .nav-link{margin:2px 0;text-align:center}}
</style>
</head>
<body>
<div class="container mt-4">
<div class="d-flex justify-content-between align-items-center mb-3">
<div><h3 class="mb-0"><i class="bi bi-shield-check"></i> Vaultwarden 备份管理</h3></div>
<a href="/logout" class="btn btn-outline-secondary btn-sm"><i class="bi bi-box-arrow-right"></i> 退出</a>
</div>

<nav class="nav nav-pills">
<a class="nav-link active" href="/"><i class="bi bi-speedometer2"></i> 仪表盘</a>
<a class="nav-link" href="/config"><i class="bi bi-gear"></i> 配置</a>
</nav>

{% if msg %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
<i class="bi bi-check-circle"></i> {{ msg }}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<div class="row g-3 mb-3">
<div class="col-md-4">
<div class="card"><div class="card-header"><h5><i class="bi bi-cloud-upload"></i> 立即备份</h5></div>
<div class="card-body">
<form action="/do_backup" method="post">
<button type="submit" class="btn btn-primary w-100"><i class="bi bi-play-circle"></i> 执行备份</button>
</form>
</div></div></div>
<div class="col-md-4">
<div class="card"><div class="card-header"><h5><i class="bi bi-arrow-counterclockwise"></i> 快速恢复</h5></div>
<div class="card-body">
<p class="text-muted mb-2">从备份列表中选择文件点击"恢复"按钮</p>
<p class="text-muted small mb-0">恢复前会自动创建回滚点</p>
</div></div>
<div class="col-md-4">
<div class="card"><div class="card-header"><h5><i class="bi bi-upload"></i> 上传恢复</h5></div>
<div class="card-body">
<form action="/do_upload_restore" method="post" enctype="multipart/form-data" onsubmit="return confirm('确定从上传的文件恢复？将停止 Vaultwarden 并替换当前数据。')">
<div class="mb-2">
<input type="file" class="form-control form-control-sm" name="file" accept=".zip" required>
</div>
<button type="submit" class="btn btn-warning w-100"><i class="bi bi-cloud-upload"></i> 上传并恢复</button>
</form>
</div></div></div>
</div>
</div>
</div>

<div class="card">
<div class="card-header"><h5><i class="bi bi-clock-history"></i> 备份历史</h5></div>
<div class="card-body">
{% if backups %}
<div class="table-responsive">
<table class="table table-hover">
<thead><tr><th>文件名</th><th>大小</th><th>修改时间</th><th>操作</th></tr></thead>
<tbody>
{% for b in backups %}
<tr>
<td><code>{{ b.name }}</code></td>
<td>{{ b.size }}</td>
<td>{{ b.mtime }}</td>
<td>
<form action="/do_restore" method="post" class="d-inline" onsubmit="return confirm('确定恢复 {{ b.name }}？将停止 Vaultwarden 并替换当前数据。')">
<input type="hidden" name="backup_file" value="{{ b.name }}">
<button type="submit" class="btn btn-danger btn-sm"><i class="bi bi-arrow-counterclockwise"></i> 恢复</button>
</form>
</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
{% else %}
<p class="text-muted text-center my-4"><i class="bi bi-inbox"></i> 暂无备份文件</p>
{% endif %}
</div></div>

<div class="card">
<div class="card-header"><h5><i class="bi bi-terminal"></i> 备份日志</h5></div>
<div class="card-body">
<div class="log-box"><pre id="log-content">加载中...</pre></div>
</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function loadLogs(){fetch('/logs').then(r=>r.json()).then(d=>{const el=document.getElementById('log-content');el.textContent=d.logs;el.parentElement.scrollTop=el.parentElement.scrollHeight}).catch(e=>{document.getElementById('log-content').textContent='加载日志失败: '+e})}
loadLogs();setInterval(loadLogs,5000);
</script>
</body>
</html>
