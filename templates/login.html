<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - Vaultwarden 备份管理</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;font-family:Segoe UI,system-ui,-apple-system,sans-serif}
.auth-card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.1);padding:48px 40px 40px;max-width:400px;width:100%}
.auth-card .icon-circle{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4361ee,#3a56d4);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.auth-card .icon-circle i{font-size:28px;color:#fff}
.auth-card h2{text-align:center;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.auth-card p{text-align:center;color:#6c757d;margin-bottom:32px;font-size:14px}
.form-control{border-radius:10px;border:1.5px solid #dee2e6;padding:12px 16px;transition:border-color .2s,box-shadow .2s}
.form-control:focus{border-color:#4361ee;box-shadow:0 0 0 3px rgba(67,97,238,.15)}
.form-control::placeholder{color:#adb5bd}
.btn{border-radius:10px;padding:12px;font-weight:600;transition:all .2s}
.btn-primary{background:#4361ee;border-color:#4361ee;color:#fff}
.btn-primary:hover{background:#3a56d4;transform:translateY(-2px);box-shadow:0 4px 14px rgba(67,97,238,.35);color:#fff}
.alert{border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:14px}
.input-group-icon{position:relative}
.input-group-icon i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#adb5bd;z-index:10}
.input-group-icon .form-control{padding-left:42px}
</style>
</head>
<body>
<div class="auth-card">
  <div class="icon-circle"><i class="bi bi-shield-lock"></i></div>
  <h2>登录</h2>
  <p>Vaultwarden 备份管理</p>
  {{if .Error}}
  <div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>{{.Error}}</div>
  {{end}}
  <form action="/do_login" method="post">
    <div class="mb-3 input-group-icon">
      <i class="bi bi-person"></i>
      <input type="text" class="form-control" name="username" placeholder="用户名" required autocomplete="username">
    </div>
    <div class="mb-4 input-group-icon">
      <i class="bi bi-lock"></i>
      <input type="password" class="form-control" name="password" placeholder="密码" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-2"></i>登录</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
