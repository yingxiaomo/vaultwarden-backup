<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - Vaultwarden 备份管理</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#2c3e50,#34495e);display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:'Segoe UI',sans-serif}
.login-card{background:#343a40;color:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.4);padding:40px;max-width:420px;width:100%;border:1px solid #495057}
.login-card h2{text-align:center;margin-bottom:8px;font-weight:700}
.login-card p{text-align:center;color:#adb5bd;margin-bottom:32px}
.form-control{background:#2b3035;border-color:#495057;color:#fff;border-radius:8px;padding:12px 16px}
.form-control:focus{background:#2b3035;color:#fff;border-color:#0d6efd;box-shadow:0 0 0 3px rgba(13,110,253,.25)}
.form-control::placeholder{color:#8a949e}
.btn{border-radius:8px;padding:12px;font-weight:600}
.btn-primary{background:#0d6efd;border-color:#0d6efd}
.btn-primary:hover{background:#0b5ed7;transform:translateY(-2px);box-shadow:0 4px 12px rgba(13,110,253,.3)}
.alert{border-radius:8px;margin-bottom:20px}
</style>
</head>
<body>
<div class="login-card">
<h2><i class="bi bi-shield-lock"></i> 身份验证</h2>
<p>Vaultwarden 备份管理面板</p>
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}
<form action="/do_login" method="post">
<div class="mb-3">
<input type="text" class="form-control" name="username" placeholder="用户名" required autocomplete="username">
</div>
<div class="mb-4">
<input type="password" class="form-control" name="password" placeholder="密码" required autocomplete="current-password">
</div>
<button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> 登录</button>
</form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
