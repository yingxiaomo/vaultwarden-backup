<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultwarden 备份管理 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background-color: #343a40; color: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 400px; padding: 2rem; border: 1px solid #495057; }
        .form-control { background-color: #2b3035; border-color: #495057; color: white; }
        .form-control:focus { background-color: #2b3035; color: white; border-color: #0d6efd; }
        .btn-primary { padding: 0.6rem; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold">🔐 身份验证</h3>
            <p class="text-secondary mt-2">Vaultwarden 备份管理面板</p>
        </div>
        
        {% if error %}
        <div class="alert alert-danger py-2 text-center" role="alert" style="font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/do_login" method="post">
            <div class="mb-3">
                <input type="text" class="form-control" name="username" placeholder="用户名" required autocomplete="username">
            </div>
            <div class="mb-4">
                <input type="password" class="form-control" name="password" placeholder="密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-100">登 录</button>
        </form>
    </div>
</body>
</html>
