<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultwarden 备份管理 - 配置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #343a40;
            color: white;
        }
        .btn-primary {
            background-color: #343a40;
            border-color: #343a40;
        }
        .btn-primary:hover {
            background-color: #23272b;
            border-color: #23272b;
        }
        .nav-link {
            color: #343a40;
        }
        .nav-link.active {
            color: white !important;
            background-color: #343a40 !important;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-control {
            border-radius: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Vaultwarden 备份管理</h1>
        
        <nav class="nav nav-pills mb-4">
            <a class="nav-link" href="/">仪表盘</a>
            <a class="nav-link active" href="/config">配置</a>
            <a class="nav-link" href="/restore">恢复</a>
        </nav>
        
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">环境变量配置</h5>
            </div>
            <div class="card-body">
                <form action="/save_config" method="post">
                    <div class="row">
                        {% for key, value in env_vars.items() %}
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="{{ key }}">{{ key }}</label>
                                    <input type="text" class="form-control" id="{{ key }}" name="{{ key }}" value="{{ value }}">
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                    <button type="submit" class="btn btn-primary mt-4">保存配置</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
