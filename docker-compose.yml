services:
  vaultwarden-backup:
    image: ghcr.io/yingxiaomo/vaultwarden-backup:latest
    container_name: vaultwarden_backup
    restart: unless-stopped
    environment:
      # 数据库类型: sqlite (默认), mysql, postgres
      - DB_TYPE=sqlite
      # SQLite 数据库文件名（默认 db.sqlite3）
      # - SQLITE_DB_FILE=db.sqlite3
      # MySQL/PostgreSQL 连接配置
      # - DB_HOST=db
      # - DB_PORT=5432
      # - DB_USER=vaultwarden
      # - DB_PASSWORD=your_db_password
      # - DB_NAME=vaultwarden

      # 压缩包加密密码（可选，不设置则非加密打包）
      # - ZIP_PASSWORD=your_secure_zip_password

      # Rclone 远端路径（格式: 配置名:路径）
      - RCLONE_REMOTE=my_onedrive:/vaultwarden_backup
      # 远端备份保留天数（可选）
      # - RCLONE_KEEP_DAYS=15

      # Apprise 通知
      - APPRISE_URL=tgram://123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZ/987654321
      # - APPRISE_API_URL=http://apprise:8000

      # 定时备份 Cron 表达式（默认每天凌晨 2 点）
      - CRON_SCHEDULE=0 2 * * *
      # 启动时立即执行一次备份（默认 true）
      - RUN_ON_STARTUP=true
      # 启动时备份延迟（秒，默认 15 秒，给数据库足够的启动时间）
      - STARTUP_DELAY=15

      # 本地备份保留天数（默认 15 天）
      - LOCAL_BACKUP_KEEP_DAYS=15
      # 备份文件前缀（默认 vaultwarden_backup）
      # - BACKUP_PREFIX=vaultwarden_backup
      # 磁盘空间阈值（默认 5120 MB）
      # - MIN_DISK_SPACE_MB=5120

      # 网络代理（可选）
      # - HTTP_PROXY=http://192.168.1.100:7890
      # - HTTPS_PROXY=http://192.168.1.100:7890

      # 时区
      - TZ=Asia/Shanghai
      # 语言（zh 中文 / en 英文）
      - LANGUAGE=zh

    volumes:
      - /你的目录/data:/data:ro
      - ./backups:/backup
      - ./rclone_config:/config/rclone/

    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
