version: '3.8'

services:
  vaultwarden-backup:
    # 使用你构建并推送到 Docker Hub 的镜像
    image: yourusername/vaultwarden-backup:latest
    container_name: vaultwarden_backup
    # 容器重启策略：失败时重启
    restart: on-failure
    environment:
      # ---------------------------------------------------------
      # 数据库配置 (根据实际使用的数据库取消注释并修改)
      # ---------------------------------------------------------
      # 数据库类型: sqlite (默认), mysql, postgres
      - DB_TYPE=sqlite
      
      # 如果使用 MySQL 或 PostgreSQL，请配置以下连接信息:
      # - DB_HOST=db
      # - DB_PORT=5432
      # - DB_USER=vaultwarden
      # - DB_PASSWORD=your_db_password
      # - DB_NAME=vaultwarden

      # ---------------------------------------------------------
      # 备份与加密配置
      # ---------------------------------------------------------
      # 压缩包 AES 加密密码 (可选，如果不设置则进行非加密打包)
      # - ZIP_PASSWORD=your_secure_zip_password
      
      # ---------------------------------------------------------
      # Rclone 云端同步配置
      # ---------------------------------------------------------
      # Rclone 远程路径，格式为 "配置名称:路径" (需先配置好 rclone.conf)
      - RCLONE_REMOTE=my_onedrive:/vaultwarden_backup
      
      # ---------------------------------------------------------
      # Apprise 通知配置 (用于备份成功/失败时的消息推送)
      # ---------------------------------------------------------
      # 方式 1: 直接使用本地 Apprise 命令行工具
      # Apprise 通知 URL。
      # 【重要】如果不需要任何通知，请将此行注释掉 (在行首加 #) 或留空。
      #
      # 配置说明 (保姆级教程):
      # 1. 找到你想要使用的通知平台。
      # 2. 按照下面的格式，替换其中的占位符部分为你自己的真实 Token/ID。
      # 3. 更多平台支持请参考 Apprise 官方文档: https://github.com/caronc/apprise
      #
      # 常见平台配置示例:
      # - Telegram:   tgram://bottoken/ChatID
      # - Discord:    discord://webhook_id/webhook_token
      # - 钉钉:       dingtalk://Token
      # - 企业微信:   wxtx://CorpID/CorpSecret/AgentID
      # - Server酱:   schan://SendKey
      # - 邮箱(SMTP): mailto://user:pass@domain.com
      - APPRISE_URL=tgram://123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZ/987654321
      
      # 方式 2: 使用独立的 Apprise 服务 API
      # Apprise 服务 API 地址，例如 http://apprise:8000
      # - APPRISE_API_URL=http://apprise:8000
      
      # ---------------------------------------------------------
      # 定时任务配置
      # ---------------------------------------------------------
      # Cron 表达式，默认每天凌晨 2 点执行 (0 2 * * *)
      # 格式: 分 时 日 月 周
      - CRON_SCHEDULE=0 2 * * *
      
      # 容器启动时是否立即执行一次备份 (true/false，默认 true)
      - RUN_ON_STARTUP=true
      
      # 本地备份保留天数 (默认 15 天)
      - LOCAL_BACKUP_KEEP_DAYS=15
      
      # 远端备份保留天数 (默认未设置，不清理)
      # - RCLONE_KEEP_DAYS=15
      
      # 备份文件前缀 (默认 vaultwarden_backup)
      # - BACKUP_PREFIX=vaultwarden_backup

      # ---------------------------------------------------------
      # 网络代理配置 (可选，用于解决国内网络访问 Apprise/Rclone 失败的问题)
      # ---------------------------------------------------------
      # - HTTP_PROXY=http://192.168.1.100:7890
      # - HTTPS_PROXY=http://192.168.1.100:7890
      
      # 时区配置 (默认 Asia/Shanghai)
      - TZ=Asia/Shanghai

    ports:
      - "9876:9876"  # Web 面板端口
    
    volumes:
      # 挂载 Vaultwarden 的数据目录 (只读挂载，保证数据安全)
      - /path/to/your/vw_data:/vw_data:ro
      
      # 挂载本地备份目录，用于存放生成的加密压缩包
      - ./backups:/backup
      
      # 【重要提醒】挂载 Rclone 配置文件目录
      # 强烈建议挂载整个目录 `./:/config/rclone/` 而不是单个文件 `rclone.conf`。
      # 因为某些网盘 (如 OneDrive, Google Drive) 的 Token 会定期刷新，
      # Rclone 需要重写配置文件。如果只挂载单文件，可能会导致 Token 刷新冲突或失败。
      - ./rclone_config:/config/rclone/
      
      # 挂载 Docker 套接字，用于控制其他容器
      - /var/run/docker.sock:/var/run/docker.sock

    # 如果使用外部数据库容器，确保备份容器在数据库启动后运行
    # depends_on:
    #   - db
    
    healthcheck:
      # 检查 crond 进程是否在运行
      test: ["CMD", "pgrep", "crond" ]
      interval: 1m
      timeout: 10s
      retries: 3