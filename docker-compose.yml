services:
  vaultwarden-backup:
    image: ghcr.io/yingxiaomo/vaultwarden-backup:latest
    container_name: vaultwarden_backup
    restart: unless-stopped
    ports:
      - "9876:9876"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/data
      - ./backups:/backup
      - ./rclone_config:/config/rclone/
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9876/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s